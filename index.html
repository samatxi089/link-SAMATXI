<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAMATXI Links</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta2/css/all.min.css" crossorigin="anonymous">

<style>
/* --- Body & Background --- */
body {
  background:#000;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:20px;
  min-height:100vh;
  cursor:pointer;
  overflow-x:hidden;
  font-family:'Karla', sans-serif;
}

#bg-video {
  position: fixed; top:0; left:0; width:100vw; height:100vh; object-fit: cover; z-index:-2; pointer-events:none; filter: brightness(0.4);
}

#snow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

/* --- Widget Status & Clock (Glass Style) --- */
.status-widget {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(168, 85, 247, 0.3);
    padding: 10px 20px;
    border-radius: 50px;
    margin-bottom: 20px;
    display: flex;
    gap: 15px;
    font-size: 12px;
    letter-spacing: 1px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    animation: fadeIn 1s ease-out forwards;
}
.status-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 8px #22c55e; animation: pulse 2s infinite; }
@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

/* --- Header & Profile --- */
.container-info { display:flex; flex-direction:column; align-items:center; margin-bottom: 30px; }
.container-info__img { width:110px; height:110px; border-radius:50%; margin-bottom:15px; object-fit:cover; border: 2px solid #a855f7; box-shadow: 0 0 25px rgba(168, 85, 247, 0.4); }
.container-info__name { font-size:1.8em; font-weight:700; text-shadow:0 0 10px rgba(168,85,247,0.5); }

/* --- Buttons (Glassmorphism Effect) --- */
.container-cards { width:100%; max-width:380px; display:flex; flex-direction:column; gap:15px; }
.container-card { 
  background: rgba(255, 255, 255, 0.03); /* Glass base */
  backdrop-filter: blur(15px); /* Strong blur */
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 18px;
  padding: 18px;
  text-decoration:none; color:#fff;
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.container-card:hover {
  background: rgba(168, 85, 247, 0.1);
  border-color: #a855f7;
  transform: translateY(-5px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.4), 0 0 15px rgba(168, 85, 247, 0.3);
}
/* Shimmer Animation fouq l-buttons */
.container-card::before {
  content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
  transition: 0.5s;
}
.container-card:hover::before { left: 100%; }

.container-card i { position: absolute; left: 25px; font-size: 20px; color: #a855f7; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

#typing-text { color: #d8b4fe; font-size: 13px; margin-top: 5px; height: 15px; }
</style>
</head>
<body>

<video autoplay muted loop playsinline id="bg-video">
  <source src="background.mp4" type="video/mp4">
</video>
<canvas id="snow"></canvas>

<div class="status-widget">
    <span><span class="status-dot"></span>Online</span>
    <span style="color: rgba(255,255,255,0.2)">|</span>
    <span id="clock">00:00:00</span>
</div>

<div class="container-info">
  <img src="profile.jpeg" class="container-info__img">
  <div class="container-info__name">SAMATXI ✧</div>
  <p id="typing-text"></p>
</div>

<div class="container-cards">
  <a class="container-card" href="https://discord.gg/XAZVUtuX" target="_blank"><i class="fab fa-discord"></i><span>DISCORD</span></a>
  <a class="container-card" href="https://snapchat.com/t/ex4d83iy" target="_blank"><i class="fab fa-snapchat"></i><span>SNAPCHAT</span></a>
  <a class="container-card" href="https://www.instagram.com/svm_ven" target="_blank"><i class="fab fa-instagram"></i><span>INSTAGRAM</span></a>
  <a class="container-card" href="https://www.tiktok.com/@samatxi.0" target="_blank"><i class="fab fa-tiktok"></i><span>TIKTOK</span></a>
</div>

<audio id="bg-music" src="music.mp3" loop></audio>

<script>
// Music & Typing
const music = document.getElementById("bg-music");
const typingText = document.getElementById('typing-text');
const text = "Tap anywhere to play music...";
let idx = 0;
function type() { if(idx < text.length){ typingText.textContent += text.charAt(idx); idx++; setTimeout(type, 70); } }
window.addEventListener('load', type);
document.body.addEventListener("click", () => { music.play().catch(()=>{}); }, {once:true});

// Clock Widget
function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('fr-FR');
}
setInterval(updateClock, 1000);
updateClock();

// Snow
const canvas = document.getElementById('snow');
const ctx = canvas.getContext('2d');
let w, h, p = [];
function res() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
window.addEventListener('resize', res); res();
class Part {
    constructor() { this.x = Math.random()*w; this.y = Math.random()*h; this.s = Math.random()*2; this.sp = Math.random()*1+0.5; }
    up() { this.y += this.sp; if(this.y>h) this.y=-5; }
    dr() { ctx.fillStyle="rgba(255,255,255,0.4)"; ctx.beginPath(); ctx.arc(this.x,this.y,this.s,0,Math.PI*2); ctx.fill(); }
}
for(let i=0; i<60; i++) p.push(new Part());
function anim() { ctx.clearRect(0,0,w,h); p.forEach(x=>{x.up(); x.dr();}); requestAnimationFrame(anim); }
anim();
</script>
</body>
</html>
